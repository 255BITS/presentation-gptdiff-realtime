<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>gptdiff · NanoGPT</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
  header { display: flex; align-items: baseline; gap: .75rem; flex-wrap: wrap; }
  h1 { font-size: 1.15rem; margin: 0; flex: 1; }
  #status { font-size: .78rem; opacity: .6; }
  label { display: block; font-size: .8rem; opacity: .7; margin: .8rem 0 .2rem; }
  input, textarea { width: 100%; box-sizing: border-box; font: inherit; padding: .5rem; border-radius: .5rem; border: 1px solid #8888; }
  textarea { font-family: ui-monospace, monospace; font-size: 13px; }
  button { font: inherit; padding: .55rem 1rem; border-radius: .5rem; border: 1px solid #8888; cursor: pointer; background: #8881; margin-top: .8rem; }
  button:disabled { opacity: .5; cursor: default; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 680px) { .cols { grid-template-columns: 1fr; } }
  pre { font-family: ui-monospace, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word;
        background: #8881; border-radius: .5rem; padding: .8rem; min-height: 3rem; margin: 0; }
  .diff .add { color: #1a7f37; } .diff .del { color: #cf222e; } .diff .hdr { opacity: .6; }
</style>
</head>
<body>
<header>
  <h1>gptdiff · diff → smartapply</h1>
  <span id="status">via local proxy</span>
</header>

<label for="path">File path</label>
<input id="path" value="greet.py" />

<label for="content">Existing file</label>
<textarea id="content" rows="8">def greet(name):
    print("hello " + name)
</textarea>

<label for="goal">Goal (what to change)</label>
<input id="goal" value="Make greet() return the string instead of printing, and add a type hint." />

<button id="run">Diff &amp; apply</button>

<div class="cols" style="margin-top:1rem">
  <div><label>Generated diff</label><pre id="diff" class="diff"></pre></div>
  <div><label>New file (after smartapply)</label><pre id="result"></pre></div>
</div>
<button id="accept" disabled>⤺ Replace editor with new file</button>

<script type="module">
const $ = (id) => document.getElementById(id);
const runBtn = $("run"), acceptBtn = $("accept");
let newContent = null;

function renderDiff(diff) {
  $("diff").innerHTML = "";
  if (!diff.trim()) { $("diff").textContent = "(no diff produced)"; return; }
  for (const line of diff.split("\n")) {
    const span = document.createElement("span");
    span.textContent = line + "\n";
    if (/^\+\+\+|^---|^@@|^diff |^a\/|^b\//.test(line)) span.className = "hdr";
    else if (line.startsWith("+")) span.className = "add";
    else if (line.startsWith("-")) span.className = "del";
    $("diff").appendChild(span);
  }
}

async function run() {
  const path = $("path").value.trim() || "file.txt";
  runBtn.disabled = true; acceptBtn.disabled = true;
  $("diff").textContent = "thinking… (diff → smartapply, two LLM calls)";
  $("result").textContent = "";
  newContent = null;
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ goal: $("goal").value, files: { [path]: $("content").value } }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    renderDiff(data.diff || "");
    newContent = data.files?.[path] ?? "(file was deleted)";
    $("result").textContent = newContent;
    acceptBtn.disabled = newContent === "(file was deleted)";
  } catch (e) {
    $("diff").textContent = "Error: " + e.message;
  } finally {
    runBtn.disabled = false;
  }
}

runBtn.addEventListener("click", run);
acceptBtn.addEventListener("click", () => {
  if (newContent != null) { $("content").value = newContent; acceptBtn.disabled = true; }
});
</script>
</body>
</html>
