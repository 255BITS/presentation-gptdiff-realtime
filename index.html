<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>gptdiff · NanoGPT</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
  header { display: flex; align-items: baseline; gap: .75rem; flex-wrap: wrap; }
  h1 { font-size: 1.15rem; margin: 0; flex: 1; }
  #status { font-size: .78rem; opacity: .6; }
  label { display: block; font-size: .8rem; opacity: .7; margin: .8rem 0 .2rem; }
  input, textarea { width: 100%; box-sizing: border-box; font: inherit; padding: .5rem; border-radius: .5rem; border: 1px solid #8888; }
  textarea { font-family: ui-monospace, monospace; font-size: 13px; }
  button { font: inherit; padding: .55rem 1rem; border-radius: .5rem; border: 1px solid #8888; cursor: pointer; background: #8881; margin-top: .8rem; }
  button:disabled { opacity: .5; cursor: default; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 680px) { .cols { grid-template-columns: 1fr; } }
  pre { font-family: ui-monospace, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word;
        background: #8881; border-radius: .5rem; padding: .8rem; min-height: 3rem; max-height: 360px; overflow: auto; margin: 0; }
  .diff .add { color: #1a7f37; } .diff .del { color: #cf222e; } .diff .hdr { opacity: .6; }
  #progress { display: none; margin-top: .8rem; padding: .7rem .9rem; border: 1px solid #8884; border-radius: .5rem;
              background: #8881; font-size: 13px; }
  #progress .metrics { font-family: ui-monospace, monospace; margin-top: .25rem; }
  #progress .dim { opacity: .6; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>gptdiff · diff → smartapply</h1>
  <span id="status">via local proxy</span>
</header>

<label for="path">File path</label>
<input id="path" value="greet.py" />

<label for="content">Existing file</label>
<textarea id="content" rows="8">def greet(name):
    print("hello " + name)
</textarea>

<label for="goal">Goal (what to change)</label>
<input id="goal" value="Make greet() return the string instead of printing, and add a type hint." />

<button id="run">Diff &amp; apply</button>

<div id="progress">
  <span class="spin">◐</span> <b id="phase">starting…</b> · ⏱ <span id="elapsed">0.0</span>s
  <div class="metrics">
    ↓ <span id="inTok">0</span> in · ↑ <span id="outTok">0</span> out · <span id="cost">$0.00000</span>
    <span id="live" class="dim"></span>
  </div>
</div>

<div class="cols" style="margin-top:1rem">
  <div><label>Generated diff</label><pre id="diff" class="diff"></pre></div>
  <div><label>New file (after smartapply)</label><pre id="result"></pre></div>
</div>
<button id="accept" disabled>⤺ Replace editor with new file</button>

<script type="module">
const $ = (id) => document.getElementById(id);
const runBtn = $("run"), acceptBtn = $("accept");
let newContent = null;

function renderDiff(diff) {
  $("diff").innerHTML = "";
  if (!diff.trim()) { $("diff").textContent = "(no diff produced)"; return; }
  for (const line of diff.split("\n")) {
    const span = document.createElement("span");
    span.textContent = line + "\n";
    if (/^\+\+\+|^---|^@@|^diff |^a\/|^b\//.test(line)) span.className = "hdr";
    else if (line.startsWith("+")) span.className = "add";
    else if (line.startsWith("-")) span.className = "del";
    $("diff").appendChild(span);
  }
}

const fmtCost = (c) => "$" + (c || 0).toFixed(5);
const n = (x) => (x || 0).toLocaleString();

// Stream generated text into the relevant pane as it arrives (diff while generating,
// file while applying). Cleared on each phase switch; replaced by the clean result on done.
let curPhase = "";
function appendText(phase, chunk) {
  const pane = phase.startsWith("Generating") ? $("diff") : $("result");
  if (phase !== curPhase) { curPhase = phase; pane.textContent = ""; }
  pane.textContent += chunk;
  pane.scrollTop = pane.scrollHeight;
}

async function run() {
  const path = $("path").value.trim() || "file.txt";
  const content = $("content").value;
  runBtn.disabled = true; acceptBtn.disabled = true; newContent = null; curPhase = "";
  $("diff").textContent = ""; $("result").textContent = "";

  // Live elapsed timer (client-side); metric values are pushed from the server.
  $("progress").style.display = "block";
  document.querySelector("#progress .spin").style.display = "";
  $("inTok").textContent = $("outTok").textContent = "0"; $("cost").textContent = "$0.00000";
  $("live").textContent = ""; $("phase").textContent = "starting…";
  const t0 = performance.now();
  const timer = setInterval(() => { $("elapsed").textContent = ((performance.now() - t0) / 1000).toFixed(1); }, 100);

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ goal: $("goal").value, files: { [path]: content } }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const o = JSON.parse(t.slice(5).trim());
        if (o.t === "phase") $("phase").textContent = o.phase;
        else if (o.t === "text") appendText(o.phase, o.chunk);
        else if (o.t === "stream") { $("phase").textContent = o.phase; $("live").textContent = o.thinking ? `· thinking… ↑ ${n(o.outChars)} chars` : `· streaming ↑ ${n(o.outChars)} chars`; }
        else if (o.t === "usage") { $("inTok").textContent = n(o.inTok); $("outTok").textContent = n(o.outTok); $("cost").textContent = fmtCost(o.costUsd); $("live").textContent = ""; }
        else if (o.t === "error") throw new Error(o.error);
        else if (o.t === "done") {
          renderDiff(o.diff || "");
          newContent = o.files?.[path] ?? "(file was deleted)";
          $("result").textContent = newContent;
          acceptBtn.disabled = newContent === "(file was deleted)";
        }
      }
    }
    $("phase").textContent = "done";
    document.querySelector("#progress .spin").style.display = "none";
  } catch (e) {
    $("diff").textContent = "Error: " + e.message;
    $("progress").style.display = "none";
  } finally {
    clearInterval(timer);
    runBtn.disabled = false;
  }
}

runBtn.addEventListener("click", run);
acceptBtn.addEventListener("click", () => {
  if (newContent != null) { $("content").value = newContent; acceptBtn.disabled = true; }
});
</script>
</body>
</html>
